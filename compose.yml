services:
  caddy:
    build: ./caddy
    image: local-caddy:latest
    ports:
      - "443:443"
    volumes:
      - caddy_data:/data
      - caddy_config:/config
    restart: unless-stopped
    environment:
      - SITE_HOSTNAME=${SITE_HOSTNAME:-localhost}
  rails:
    build:
      context: ./
      target: dev
    command: >
      bash -lc "bundle check || bundle install && rm -f tmp/pids/server.pid && bundle exec rails server -b 0.0.0.0 -p 3000"
    volumes:
      - .:/copi-loca:delegated
      - vendor_bundle:/copi-loca/vendor/bundle
      - ${COPILOCA_APP_PATH:-.}:/app:delegated
      - rails_home:/homedir
    working_dir: /copi-loca
    environment:
      - RAILS_ENV=development
      - BUNDLE_PATH=/copi-loca/vendor/bundle
      - SITE_HOSTNAME=${SITE_HOSTNAME:-localhost}
      - COPI_ADMIN_PASSWORD=${COPI_ADMIN_PASSWORD:-}
      - SKIP_PENDING_MIGRATIONS_CHECK=true
      - HOME=/homedir
      - COPILOCA_GITHUB_TOKEN=${COPILOCA_GITHUB_TOKEN:-}
    user: "${USR:-root}"
    restart: unless-stopped

volumes:
  caddy_data:
  caddy_config:
  vendor_bundle:
  rails_home:
