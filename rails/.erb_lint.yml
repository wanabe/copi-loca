---
glob: "app/**/*.{html,text,js}{+*,}.erb"
EnableDefaultLinters: true
linters:
  Rubocop:
    enabled: true
    rubocop_config:
      inherit_from:
        - .rubocop.yml
      Layout/TrailingEmptyLines:
        Enabled: false
  HardCodedString:
    enabled: false
  PartialInstanceVariable:
    enabled: true
